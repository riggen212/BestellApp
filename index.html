<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerHouse</title>
    <link rel="shortcut icon" href="./assets/icons/fav_icon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">

    <script src="./scripts/menu_database.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./scripts/script.js"></script>
</head>

<body onload="showMenus()">
    <header>
        <div class="headerTop">
            <div class="headerContent">
                <img src="./assets/icons/logo_header.svg" alt="the logo of the website">
                <img src="./assets/icons/nav_menu.svg" alt="the icon of the navigation menu">
            </div>
        </div>

        <section class="headerImages">

            <img class="landingImage" src="./assets/img/img_header.png" alt="a picture of great pizza meal">
            <img class="landingBurgerLogo" src="./assets/img/logo_burger.png" alt="a picture of a beaf burger">
            <div class="headline">
                <h1><span class="nameLineOne">Burger</span><span class="nameLineTwo">House</span></h1>
                <div class="rating">
                    <img src="./assets/icons/star.svg" alt="">
                    <span class="ratingValue">4,1</span><span class="ratingAmount">(317)</span>
                </div>
            </div>
            <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </section>
    </header>

    <main>
        <section id="burgerMenu" class="menuCategory">
            <div class="menuCategoryHeadlineBackground">
                <div class="menuCategoryHeadline spaceBetween">
                    <aside id="basketArea" class="basket">
                        <h2>Your Basket</h2>
                        <div id="basketMemberCard" class="basketContent customScroll">
                            <section id="emptyBasket" class="basketEmptyText">
                                <p>Nothing here yet. Go ahead and choose something delicious!</p>
                                <img src="./assets/icons/basket_icon.svg" alt="">
                            </section>
                        </div>

                        <section id="basketCalculation" class="orderCalculation orderCalculationHidden">
                            <div class="priceCalculation">
                                <p><span>Subtotal</span><span id="subPrice"></span></p>
                                <p><span>Delivery fee</span><span id="deliveryFee">5.99€</span></p>
                                <hr>
                                <p><span> Total</span><span id="totalPrice"></span></p>
                            </div>
                            <button>Buy now (<span id="priceButton"></span>)</button>
                        </section>
                    </aside>
                    <div class="flexbox">
                        <img src="./assets/icons/burger_icon.svg" alt="a picture of a hamburger">
                        <h2>Burger & Sandwiches</h2>
                    </div>
                </div>
            </div>
        </section>

        <section id="pizzaMenu" class="menuCategory">
            <div class="menuCategoryHeadlineBackground">
                <div class="menuCategoryHeadline">
                    <img src="./assets/icons/pizza_icon.svg" alt="a picture of a pizza">
                    <h2>Pizza (30cm)</h2>
                </div>
            </div>
        </section>

        <section id="saladMenu" class="menuCategory">
            <div class="menuCategoryHeadlineBackground">
                <div class="menuCategoryHeadline">
                    <img src="./assets/icons/salad_icon.svg" alt="a picture of a salad">
                    <h2>Salad</h2>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footerContent">
            <span>&copy; 2025 BurgerHouse</span>
            <span>Imprint</span>
            <span>Cookie Preferences</span>
        </div>

    </footer>
</body>

</html>
